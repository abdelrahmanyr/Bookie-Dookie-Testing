
    <title>Bookie Dookie</title>
    <link rel="icon" type="image/x-icon" href="assets/logo.png">
    <link rel="stylesheet" href="style/add_books.css">
    <link rel="stylesheet" href="style/Alerts.css" />
    
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Exo:ital,wght@0,100..900;1,100..900&family=Murecho:wght@100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>


<body>
    <header>
        <div class="shadow_ellipse" id="_1_hero"></div>
        <div class="shadow_ellipse" id="_2_hero"></div>
        <div class="shadow_ellipse" id="_3_hero"></div>
    </header>

    <aside>

        <div class="logo_cont">
            <a href="index.html" class="logo_link">
                <img src = "assets/full_logo.svg" alt="Bookie Dookie Logo" class="logo">
            </a>
        </div>
        
        <div class="nav_btn">
            <ul class="nav_list">
                <li><a href="dashboard.html" class="nav_item"> <img src = "icons/dashboard.svg" alt="Dashboard" class = "nav_icon">Dashboard</a></li>
                <li><a href="admin_books.html" class="nav_item"> <img src = "icons/books.svg" alt = "Books" class = "nav_icon">Books</a></li>
                <li><a href="add_books.html" class="nav_item"> <img src = "icons/add_book.svg" alt = "nav_icon" class = "addbooksicon">Add Books</a></li>
            </div>
            
            <div class="logout_btn">
                <a href="index.html" class="nav_item"> <img src = "icons/logout.svg" alt = "Logout" class = "nav_icon">Logout</a>
            </div>
    </aside>
    
    <main class="main">
        <h2>Add Books</h2>
        <div class = "form_container">
            <form class="add_books">
                
                <div class="form_row">
                    <div class="field">
                        <label for="book_title" class="book_title">Title</label>
                        <input type="text" id="book_title" name="book_title" class="input_field" required>
                    </div>
                    
                    <div class="field">
                        <label for="author_name" class="author_name">Author</label>
                        <input type="text" id="author_name" name="author_name" class="input_field" required>
                    </div>
                </div>

                <div class="form_row">
                    <div class="field">
                        <label for="book_category" class="book_cat">Category</label>
                        <input type="text" id="book_category" name="book_category" class="input_field" required>
                    </div>

                    <div class="field" id="url_field">
                        <label for="cover_url" class="cover_url">Cover's URL</label>
                        <input type="text" id="cover_url" name="cover_url" class="textarea_field" required></input>
                    </div>
                </div>


                <div class="field" id="description_field">
                    <label for="book_description" class="book_description">Description</label>
                    <textarea id="book_description" name="book_description" class="textarea_field" required></textarea>
                </div>
                
                <button type="submit" class = "submit" onclick="addBook()">Add Book</button>
            </form>
        </div>
    </main>

    <div id="customAlert" class="custom-alert hidden">
        <div class="alert-content">
            <p id="alertMessage"></p>
            <button onclick="closeAlert()">OK</button>
        </div>
      </div>
</body>
<script type="text/javascript" src="http://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src = "scripts/add_books.js" defer></script>
<script src="scripts/index.js" defer></script>
<script src="scripts/admin.js" defer></script>
</html>
